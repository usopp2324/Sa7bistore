{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
	<div class="glass p-6 rounded-lg">
		<h2 class="text-2xl font-bold">Application — {{ application.tournament.title }}</h2>
		<div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
			<div>
				<div class="text-sm text-gray-400">Applicant</div>
				<div class="font-semibold">{{ application.applicant.username }}</div>
			</div>
			<div>
				<div class="text-sm text-gray-400">Status</div>
				<div class="font-semibold">{{ application.get_status_display }}</div>
			</div>
			<div>
				<div class="text-sm text-gray-400">IGN</div>
				<div class="font-semibold">{{ application.ign_tag }}</div>
			</div>
			<div>
				<div class="text-sm text-gray-400">Rank</div>
				<div class="font-semibold">{{ application.rank }}</div>
			</div>
		</div>
	</div>
</div>
<link rel="stylesheet" href="{% static 'tournaments/css/tournaments.css' %}">
{% endblock %}
